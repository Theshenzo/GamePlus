<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GamePlus</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
    margin:0;
    font-family:tahoma;
    background:#0d1117;
    color:white;
}

.header{
    text-align:center;
    padding:40px 20px;
}

.header h1{
    color:#00d4ff;
    font-size:48px;
}

.container{
    max-width:500px;
    margin:auto;
    background:#161b22;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,212,255,.3);
}

input,select{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:none;
    border-radius:8px;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    background:#00d4ff;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}

#result{
    margin-top:15px;
    text-align:center;
}
</style>
</head>

<body>

<div class="header">
    <h1>🎮 GamePlus</h1>
    <p>رزرو آنلاین کنسول و کامپیوتر</p>
</div>

<div class="container">

    <input type="text" id="name" placeholder="نام و نام خانوادگی">

    <input type="text" id="phone" placeholder="شماره موبایل">

    <select id="device">
        <option>PS5</option>
        <option>PS4</option>
        <option>PC</option>
    </select>

    <input type="date" id="date">

    <button onclick="reserve()">ثبت رزرو</button>

    <div id="result"></div>

</div>

<script>

const SUPABASE_URL =
"https://vavknjxpypmqvhjouocj.supabase.co";

const SUPABASE_KEY =
"sb_publishable_7CDDTZCxAS1rV25Zpam1sg_1dlNW-4h";

const supabaseClient = supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

async function reserve(){

const name=document.getElementById("name").value;
const phone=document.getElementById("phone").value;
const device=document.getElementById("device").value;
const date=document.getElementById("date").value;

const {error}=await supabaseClient
.from("reservations")
.insert([
{
name:name,
phone:phone,
device:device,
date:date
}
]);

if(error){
document.getElementById("result").innerHTML=
"❌ خطا در ثبت رزرو";
console.log(error);
}
else{
document.getElementById("result").innerHTML=
"✅ رزرو با موفقیت ثبت شد";
}
}
</script>

</body>
</html>
