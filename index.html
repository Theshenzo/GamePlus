<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GamePlus</title>

<style>
body{
    margin:0;
    font-family:tahoma;
    background:#121212;
    color:white;
}

header{
    background:#1f1f1f;
    padding:20px;
    text-align:center;
}

.hero{
    text-align:center;
    padding:60px 20px;
}

.hero h1{
    font-size:50px;
    color:#00e676;
}

.hero p{
    font-size:20px;
}

.btn{
    background:#00e676;
    color:black;
    padding:12px 25px;
    text-decoration:none;
    border-radius:8px;
    display:inline-block;
    margin-top:20px;
}

.section{
    padding:40px 20px;
}

.cards{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
    justify-content:center;
}

.card{
    background:#1f1f1f;
    padding:20px;
    width:250px;
    border-radius:12px;
    text-align:center;
}

footer{
    background:#1f1f1f;
    text-align:center;
    padding:20px;
}
</style>
</head>

<body>

<header>
    <h2>🎮 GamePlus</h2>
</header>

<section class="hero">
    <h1>رزرو آنلاین گیم نت</h1>
    <p>رزرو PS5 ، PS4 و کامپیوتر فقط با چند کلیک</p>
    <a href="#" class="btn">رزرو کن</a>
</section>

<section class="section">
    <h2 style="text-align:center">دستگاه‌ها</h2>

    <div class="cards">
        <div class="card">
            <h3>PS5</h3>
            <p>تجربه نسل جدید بازی</p>
        </div>

        <div class="card">
            <h3>PS4</h3>
            <p>بازی‌های محبوب و آنلاین</p>
        </div>

        <div class="card">
            <h3>Gaming PC</h3>
            <p>سیستم‌های قدرتمند گیمینگ</p>
        </div>
    </div>
</section>

<section class="section">
    <h2 style="text-align:center">تماس با ما</h2>
    <p style="text-align:center">
        شماره تماس: 09xxxxxxxxx
    </p>
</section>

<footer>
    © GamePlus 2025
</footer>

</body>
</html>
