<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GamePlus</title>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Vazirmatn',sans-serif;
}

body{
background:#0a0a0a;
color:white;
}

header{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:
linear-gradient(rgba(0,0,0,.7),rgba(0,0,0,.7)),
url("https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&w=1500&q=80");
background-size:cover;
background-position:center;
}

header h1{
font-size:70px;
color:#00d9ff;
text-shadow:0 0 20px #00d9ff;
}

header p{
margin-top:15px;
font-size:22px;
color:#ddd;
}

.btn{
margin-top:25px;
padding:14px 35px;
border:none;
border-radius:30px;
background:#00d9ff;
color:black;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

.btn:hover{
transform:scale(1.05);
box-shadow:0 0 20px #00d9ff;
}

section{
padding:70px 10%;
}

.title{
text-align:center;
font-size:38px;
margin-bottom:40px;
color:#00d9ff;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.card{
background:#151515;
padding:25px;
border-radius:15px;
text-align:center;
transition:.3s;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 0 20px #00d9ff50;
}

.card h3{
margin-bottom:15px;
}

.form-container{
max-width:450px;
margin:auto;
background:#151515;
padding:30px;
border-radius:20px;
}

.tabs{
display:flex;
margin-bottom:20px;
}

.tabs button{
flex:1;
padding:12px;
border:none;
cursor:pointer;
font-size:16px;
}

.active-tab{
background:#00d9ff;
color:black;
font-weight:bold;
}

input{
width:100%;
padding:14px;
margin:10px 0;
border:none;
border-radius:10px;
background:#222;
color:white;
}

.submit{
width:100%;
padding:14px;
background:#00d9ff;
border:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

footer{
text-align:center;
padding:25px;
background:#111;
margin-top:50px;
}

.hidden{
display:none;
}

</style>
</head>
<body>

<header>

<h1>🎮 GamePlus</h1>

<p>
رزرو آنلاین کنسول، پلی استیشن و سیستم گیمینگ
</p>

<button class="btn" onclick="document.getElementById('login').scrollIntoView()">
ورود به حساب
</button>

</header>

<section>

<h2 class="title">خدمات ما</h2>

<div class="cards">

<div class="card">
<h3>🎮 PlayStation 5</h3>
<p>رزرو آنلاین PS5</p>
</div>

<div class="card">
<h3>🖥 Gaming PC</h3>
<p>سیستم‌های گیمینگ حرفه‌ای</p>
</div>

<div class="card">
<h3>🏆 مسابقات</h3>
<p>برگزاری تورنمنت و لیگ</p>
</div>

</div>

</section>

<section id="login">

<h2 class="title">حساب کاربری</h2>

<div class="form-container">

<div class="tabs">
<button class="active-tab" onclick="showLogin()">ورود</button>
<button onclick="showRegister()">ثبت نام</button>
</div>

<form id="loginForm">

<input type="email" placeholder="ایمیل">

<input type="password" placeholder="رمز عبور">

<button type="button" class="submit" onclick="login()">
ورود
</button>

</form>

<form id="registerForm" class="hidden">

<input id="name" placeholder="نام">

<input id="email" placeholder="ایمیل">

<input id="password" type="password" placeholder="رمز عبور">

<button type="button" class="submit" onclick="register()">
ثبت نام
</button>

</form>

</div>

</section>

<footer>

<p>© 2025 GamePlus</p>

</footer>

<script>

function showLogin(){

document.getElementById("loginForm").classList.remove("hidden");
document.getElementById("registerForm").classList.add("hidden");

}

function showRegister(){

document.getElementById("registerForm").classList.remove("hidden");
document.getElementById("loginForm").classList.add("hidden");

}

function register(){

const name=document.getElementById("name").value;
const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

localStorage.setItem("user",JSON.stringify({
name,email,password
}));

alert("ثبت نام با موفقیت انجام شد");

showLogin();

}

function login(){

const user=JSON.parse(localStorage.getItem("user"));

if(!user){

alert("ابتدا ثبت نام کنید");
return;

}

alert("خوش آمدید "+user.name);

}

</script>

</body>
</html>
