<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://vavknjxpypmqvhjouocj.supabase.co";
const supabaseKey = "API_KEY_خودت";

const supabaseClient = supabase.createClient(
  supabaseUrl,
  supabaseKey
);

async function saveReservation() {

  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;
  const device = document.getElementById("device").value;
  const date = document.getElementById("date").value;

  const { error } = await supabaseClient
    .from("reservations")
    .insert([
      {
        name,
        phone,
        device,
        date
      }
    ]);

  if(error){
    alert("خطا در ثبت رزرو");
    console.log(error);
  }else{
    alert("رزرو با موفقیت ثبت شد");
  }
}
</script>

<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <title>GamePlus</title>
</head>

<body>

    <!-- محتوای فعلی سایت -->

    <h1>GamePlus</h1>

    <!-- فرم رزرو -->
    <div class="reservation-box">

        <h2>رزرو آنلاین</h2>

        <input id="name" placeholder="نام">

        <input id="phone" placeholder="شماره موبایل">

        <select id="device">
            <option>PS5</option>
            <option>PS4</option>
            <option>PC</option>
        </select>

        <input id="date" type="date">

        <button onclick="saveReservation()">
            ثبت رزرو
        </button>

    </div>

    <!-- کد Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
      // کد اتصال Supabase اینجا
    </script>

</body>
</html>
