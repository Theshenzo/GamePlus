<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GamePlus - رزرو آنلاین</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:tahoma;
}

body{
background:#0a0a0a;
color:white;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.container{
width:100%;
max-width:650px;
background:#121212;
padding:35px;
border-radius:20px;
box-shadow:0 0 25px rgba(0,255,255,.2);
}

h1{
text-align:center;
font-size:42px;
color:#00d9ff;
margin-bottom:10px;
}

.subtitle{
text-align:center;
margin-bottom:30px;
color:#ccc;
}

label{
display:block;
margin-top:15px;
margin-bottom:6px;
}

input,select{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#1e1e1e;
color:white;
font-size:15px;
}

button{
width:100%;
margin-top:25px;
padding:14px;
border:none;
border-radius:12px;
background:#00d9ff;
color:black;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.02);
}

#result{
display:none;
margin-top:25px;
background:#1b1b1b;
padding:15px;
border-radius:10px;
border-right:4px solid #00d9ff;
}
</style>
</head>
<body>

<div class="container">

<h1>🎮 GamePlus</h1>
<p class="subtitle">رزرو آنلاین کنسول و سیستم گیمینگ</p>

<label>نام و نام خانوادگی</label>
<input type="text" id="name">

<label>شماره تماس</label>
<input type="text" id="phone">

<label>نوع دستگاه</label>
<select id="device">
<option>PlayStation 5</option>
<option>PlayStation 4</option>
<option>Gaming PC</option>
</select>

<label>تاریخ رزرو</label>
<input type="date" id="date">

<label>ساعت شروع</label>
<input type="time" id="time">

<label>مدت زمان</label>
<select id="hours">
<option>1 ساعت</option>
<option>2 ساعت</option>
<option>3 ساعت</option>
<option>4 ساعت</option>
<option>5 ساعت</option>
</select>

<button onclick="reserve()">ثبت رزرو</button>

<div id="result"></div>

</div>

<script>
function reserve(){

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let device=document.getElementById("device").value;
let date=document.getElementById("date").value;
let time=document.getElementById("time").value;
let hours=document.getElementById("hours").value;

if(!name || !phone || !date || !time){
alert("لطفا همه فیلدها را تکمیل کنید");
return;
}

let result=document.getElementById("result");

result.style.display="block";
result.innerHTML=`
<h3>✅ رزرو ثبت شد</h3>
<br>
نام: ${name}<br>
تلفن: ${phone}<br>
دستگاه: ${device}<br>
تاریخ: ${date}<br>
ساعت: ${time}<br>
مدت زمان: ${hours}
`;
}
</script>

</body>
</html>
